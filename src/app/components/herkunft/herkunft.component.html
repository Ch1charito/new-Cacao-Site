<section id="herkunft" class="herkunft">
    <div class="herkunft-inner">

        <div class="herkunft-text reveal">
            <span class="eyebrow">{{ 'origin.eyebrow' | translate }}</span>
            <h2 class="section-title">{{ 'origin.title' | translate }}</h2>
            <div class="divider"></div>

            <p>{{ 'origin.p1' | translate }}</p>
            <p style="margin-top: 1.2rem;">{{ 'origin.p2' | translate }}</p>
            <p style="margin-top: 1.2rem; font-style: italic; color: var(--text-secondary);">{{ 'origin.p3' | translate }}</p>
        </div>

        <div class="herkunft-facts reveal">

            <div class="fact-card">
                <span class="fact-number">50+</span>
                <span class="fact-label">{{ 'origin.fact1' | translate }}</span>
            </div>

            <div class="fact-card">
                <span class="fact-icon">◈</span>
                <span class="fact-label">{{ 'origin.fact2' | translate }}</span>
            </div>

            <div class="fact-card">
                <span class="fact-icon">◈</span>
                <span class="fact-label">{{ 'origin.fact3' | translate }}</span>
            </div>

        </div>

    </div>
</section>
