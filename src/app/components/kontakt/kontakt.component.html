<section id="kontakt" class="kontakt">

    <div class="kontakt-inner">

        <div class="kontakt-header reveal">
            <span class="eyebrow">Kontakt</span>
            <h2 class="section-title">Geschäftliche Anfragen</h2>
            <div class="divider"></div>
            <p class="kontakt-sub">
                Sie interessieren sich für unsere Produkte? Wir freuen uns auf Ihre Nachricht.
            </p>
        </div>

        <form class="kontakt-form reveal" (ngSubmit)="onSubmit(kontaktForm)" #kontaktForm="ngForm">

            <div class="form-group">
                <label for="name">Name <span class="req">*</span></label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    [(ngModel)]="contactData.name"
                    placeholder="Ihr vollständiger Name"
                    required />
            </div>

            <div class="form-group">
                <label for="email">E-Mail <span class="req">*</span></label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    [(ngModel)]="contactData.email"
                    placeholder="ihre@email.com"
                    required />
            </div>

            <div class="form-group">
                <label for="message">Nachricht <span class="req">*</span></label>
                <textarea
                    id="message"
                    name="message"
                    [(ngModel)]="contactData.message"
                    rows="5"
                    placeholder="Beschreiben Sie kurz Ihr Interesse oder Ihren Bedarf ..."
                    required></textarea>
            </div>

            <button type="submit" class="submit-btn" [disabled]="!kontaktForm.form.valid">
                Nachricht senden <span class="btn-arrow">→</span>
            </button>

            @if (sendSuccess) {
                <p class="success-msg">Ihre Nachricht wurde erfolgreich gesendet.</p>
            }

        </form>

    </div>

</section>
