<section id="kontakt" class="kontakt">

    <div class="kontakt-inner">

        <div class="kontakt-header reveal">
            <span class="eyebrow">Kontakt</span>
            <h2 class="section-title">Geschäftliche Anfragen</h2>
            <div class="divider"></div>
            <p class="kontakt-sub">
                Sie interessieren sich für unsere Produkte? Wir freuen uns auf Ihre Nachricht.
            </p>
        </div>

        <form class="kontakt-form reveal">

            <div class="form-group">
                <label>Name *</label>
                <input type="text" placeholder="Ihr vollständiger Name" />
            </div>

            <div class="form-group">
                <label>E-Mail *</label>
                <input type="email" placeholder="ihre@email.com" />
            </div>

            <div class="form-group">
                <label>Nachricht *</label>
                <textarea rows="5" placeholder="Beschreiben Sie kurz Ihr Interesse oder Ihren Bedarf ..."></textarea>
            </div>

            <button type="button" class="submit-btn">
                Nachricht senden <span class="btn-arrow">→</span>
            </button>

        </form>

    </div>

</section>
