<footer class="footer">

    <div class="footer-inner">

        <div class="footer-brand">
            <span class="footer-name">Talisman</span>
            <span class="footer-sub">Cacao Fino de Aroma</span>
            <p class="footer-tagline">{{ 'footer.tagline' | translate }}</p>
        </div>

        <nav class="footer-nav">
            <a href="#herkunft">{{ 'nav.origin' | translate }}</a>
            <a href="#verarbeitung">{{ 'nav.process' | translate }}</a>
            <a href="#produkte">{{ 'nav.products' | translate }}</a>
            <a href="#kontakt">{{ 'nav.contact' | translate }}</a>
        </nav>

    </div>

    <div class="footer-bottom">
        <span>© {{ year }} Talisman Cacao. {{ 'footer.rights' | translate }}</span>
        <div class="footer-legal">
            <a [routerLink]="['/impressum']">Impressum</a>
            <span>·</span>
            <a [routerLink]="['/datenschutz']">Datenschutz</a>
        </div>
    </div>

</footer>
